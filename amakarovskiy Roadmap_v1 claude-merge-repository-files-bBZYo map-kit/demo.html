<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phuket Map Kit — Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --green: #BBFF46; --gdk: #96D930; --muted: rgba(255,255,255,0.45); }
    body {
      font-family: 'Inter Tight', sans-serif;
      background: #0A0A0A;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 {
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      background: #0c1420;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    h1 span { color: #BBFF46; }
    #map {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at center, rgba(9,60,70,0.3) 0%, #0A0A0A 70%);
    }
  </style>
  <link rel="stylesheet" href="map-styles.css">
</head>
<body>
  <h1>Phuket Map Kit — <span>Demo</span></h1>

  <div id="map">
    <svg id="map-svg" viewBox="0 0 600 1000" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="island-layer"></g>
      <g id="areas-layer"></g>
      <g id="roads-layer"></g>
      <g id="route-layer"></g>
      <g id="poi-layer"></g>
      <g id="labels-layer"></g>
    </svg>

    <div class="map-legend">
      <div class="legend-title">ЛЕГЕНДА</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ff5a5a"></span> Пляжи</div>
      <div class="legend-item"><span class="legend-dot" style="background:#44dd66"></span> Смотровые</div>
      <div class="legend-item"><span class="legend-dot" style="background:#ffaa33"></span> Храмы</div>
      <div class="legend-item"><span class="legend-dot" style="background:#33cc88"></span> Природа</div>
      <div class="legend-item"><span class="legend-dot" style="background:#55bbff"></span> Знаковые места</div>
    </div>

    <div class="map-zoom">
      <button class="map-zoom-btn" onclick="svgMapZoomCenter(1)">+</button>
      <button class="map-zoom-btn" onclick="svgMapZoomCenter(-1)">&minus;</button>
    </div>

    <div class="map-scale">
      <div class="map-scale-bar"></div>
      <span class="map-scale-label">10 km</span>
    </div>
  </div>

  <script>
    /* === Minimal standalone map engine for demo === */

    var MAP_BOUNDS = { latMin: 7.74, latMax: 8.18, lngMin: 98.26, lngMax: 98.42 };
    var SVG_W = 600, SVG_H = 1000;
    var mapViewBox = { x: 0, y: 0, w: SVG_W, h: SVG_H };
    var mapDragging = false;
    var mapDragStart = { x: 0, y: 0, vx: 0, vy: 0 };
    var pinchStartDist = 0;
    var pinchStartViewBox = null;

    function gpsToSvg(lat, lng) {
      return {
        x: ((lng - MAP_BOUNDS.lngMin) / (MAP_BOUNDS.lngMax - MAP_BOUNDS.lngMin)) * SVG_W,
        y: ((MAP_BOUNDS.latMax - lat) / (MAP_BOUNDS.latMax - MAP_BOUNDS.latMin)) * SVG_H
      };
    }

    function svgEl(tag, attrs) {
      var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (var k in attrs) el.setAttribute(k, attrs[k]);
      return el;
    }

    function coordsToPath(coords, closed) {
      return coords.map(function(c, i) {
        var p = gpsToSvg(c[0], c[1]);
        return (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1);
      }).join(' ') + (closed ? ' Z' : '');
    }

    function applyViewBox() {
      document.getElementById('map-svg').setAttribute('viewBox',
        mapViewBox.x + ' ' + mapViewBox.y + ' ' + mapViewBox.w + ' ' + mapViewBox.h);
    }

    function svgMapZoomCenter(dir) {
      var factor = dir > 0 ? 0.8 : 1.25;
      var newW = mapViewBox.w * factor, newH = mapViewBox.h * factor;
      if (newW < 80 || newW > SVG_W * 2) return;
      var cx = mapViewBox.x + mapViewBox.w / 2, cy = mapViewBox.y + mapViewBox.h / 2;
      mapViewBox = { x: cx - newW / 2, y: cy - newH / 2, w: newW, h: newH };
      applyViewBox();
    }

    /* --- Island coastline --- */
    var ISLAND = [
      [8.165,98.305],[8.160,98.295],[8.150,98.288],[8.135,98.283],[8.120,98.280],
      [8.105,98.278],[8.090,98.276],[8.075,98.274],[8.060,98.273],[8.045,98.272],
      [8.030,98.271],[8.015,98.275],[8.000,98.278],[7.985,98.275],[7.970,98.272],
      [7.955,98.275],[7.940,98.276],[7.925,98.278],[7.910,98.280],[7.895,98.285],
      [7.880,98.283],[7.865,98.280],[7.850,98.278],[7.835,98.280],[7.820,98.283],
      [7.810,98.286],[7.800,98.288],[7.790,98.290],[7.780,98.293],[7.770,98.298],
      [7.762,98.305],[7.758,98.312],[7.755,98.320],[7.758,98.330],[7.762,98.340],
      [7.770,98.345],[7.780,98.342],[7.790,98.338],[7.800,98.340],[7.810,98.345],
      [7.815,98.355],[7.820,98.365],[7.830,98.375],[7.840,98.380],[7.850,98.385],
      [7.860,98.390],[7.870,98.395],[7.880,98.400],[7.890,98.405],[7.900,98.408],
      [7.910,98.405],[7.920,98.400],[7.930,98.395],[7.940,98.390],[7.950,98.388],
      [7.960,98.392],[7.970,98.398],[7.980,98.405],[7.990,98.410],[8.000,98.412],
      [8.015,98.410],[8.030,98.405],[8.045,98.400],[8.060,98.395],[8.075,98.390],
      [8.090,98.385],[8.100,98.378],[8.110,98.370],[8.120,98.365],[8.130,98.355],
      [8.140,98.345],[8.145,98.335],[8.150,98.325],[8.155,98.315],[8.165,98.305]
    ];

    /* --- Roads --- */
    var ROAD_MAIN = [
      [8.15,98.305],[8.10,98.300],[8.05,98.295],[8.00,98.300],[7.95,98.305],
      [7.90,98.310],[7.88,98.320],[7.86,98.340],[7.84,98.345],[7.82,98.340],
      [7.80,98.330],[7.78,98.320],[7.77,98.315]
    ];

    /* --- Areas --- */
    var AREAS = [
      { lat: 8.14, lng: 98.295, rx: 30, ry: 22, name: 'Mai Khao' },
      { lat: 8.01, lng: 98.287, rx: 28, ry: 20, name: 'Bang Tao' },
      { lat: 7.97, lng: 98.277, rx: 22, ry: 16, name: 'Surin' },
      { lat: 7.94, lng: 98.280, rx: 24, ry: 18, name: 'Kamala' },
      { lat: 7.895, lng: 98.293, rx: 30, ry: 22, name: 'Patong', main: true },
      { lat: 7.845, lng: 98.295, rx: 26, ry: 18, name: 'Karon' },
      { lat: 7.818, lng: 98.298, rx: 22, ry: 16, name: 'Kata' },
      { lat: 7.785, lng: 98.330, rx: 25, ry: 18, name: 'Rawai' },
      { lat: 7.845, lng: 98.370, rx: 28, ry: 20, name: 'Chalong', main: true },
      { lat: 7.885, lng: 98.395, rx: 32, ry: 24, name: 'Phuket Town', main: true },
      { lat: 7.765, lng: 98.310, rx: 18, ry: 14, name: 'Promthep' }
    ];

    /* --- Demo POIs --- */
    var DEMO_POIS = [
      { name: 'Patong Beach',     lat: 7.896, lng: 98.297, color: '#ff5a5a' },
      { name: 'Karon Beach',      lat: 7.845, lng: 98.295, color: '#ff5a5a' },
      { name: 'Kata Beach',       lat: 7.818, lng: 98.299, color: '#ff5a5a' },
      { name: 'Freedom Beach',    lat: 7.875, lng: 98.276, color: '#ff5a5a' },
      { name: 'Nai Harn Beach',   lat: 7.769, lng: 98.305, color: '#ff5a5a' },
      { name: 'Surin Beach',      lat: 7.973, lng: 98.277, color: '#ff5a5a' },
      { name: 'Bang Tao Beach',   lat: 8.011, lng: 98.287, color: '#ff5a5a' },
      { name: 'Mai Khao Beach',   lat: 8.150, lng: 98.295, color: '#ff5a5a' },
      { name: 'Promthep Cape',    lat: 7.765, lng: 98.307, color: '#44dd66' },
      { name: 'Karon Viewpoint',  lat: 7.831, lng: 98.303, color: '#44dd66' },
      { name: 'Big Buddha',       lat: 7.828, lng: 98.342, color: '#44dd66' },
      { name: 'Windmill VP',      lat: 7.773, lng: 98.306, color: '#44dd66' },
      { name: 'Rang Hill',        lat: 7.891, lng: 98.391, color: '#44dd66' },
      { name: 'Wat Chalong',      lat: 7.846, lng: 98.339, color: '#ffaa33' },
      { name: 'Serene Light',     lat: 7.886, lng: 98.397, color: '#ffaa33' },
      { name: 'Ton Sai Waterfall',lat: 8.073, lng: 98.355, color: '#33cc88' },
      { name: 'Old Town',         lat: 7.885, lng: 98.393, color: '#55bbff' },
      { name: 'ThaiGo Office',    lat: 7.844, lng: 98.298, color: '#BBFF46', office: true }
    ];

    /* --- Draw everything --- */
    function drawMap() {
      // Island
      var il = document.getElementById('island-layer');
      il.appendChild(svgEl('path', {
        d: coordsToPath(ISLAND, true),
        fill: 'rgba(10,60,80,0.5)', stroke: '#22cc66',
        'stroke-width': '2', 'stroke-opacity': '0.4'
      }));

      // Areas
      var al = document.getElementById('areas-layer');
      AREAS.forEach(function(a) {
        var p = gpsToSvg(a.lat, a.lng);
        al.appendChild(svgEl('ellipse', {
          cx: p.x, cy: p.y, rx: a.rx, ry: a.ry,
          fill: 'rgba(30,140,80,0.15)', stroke: 'rgba(50,200,100,0.08)', 'stroke-width': '1'
        }));
      });

      // Road
      var rl = document.getElementById('roads-layer');
      rl.appendChild(svgEl('path', {
        d: coordsToPath(ROAD_MAIN, false), fill: 'none',
        stroke: '#BBFF46', 'stroke-width': '2.5', 'stroke-opacity': '0.35',
        'stroke-dasharray': '6,4', 'stroke-linecap': 'round'
      }));

      // Labels
      var ll = document.getElementById('labels-layer');
      AREAS.forEach(function(a) {
        var p = gpsToSvg(a.lat, a.lng);
        var t = svgEl('text', {
          x: p.x, y: p.y - a.ry - 5, 'text-anchor': 'middle',
          'font-family': 'Inter Tight, sans-serif',
          'font-size': a.main ? '13' : '10',
          'font-weight': a.main ? '700' : '600',
          fill: 'rgba(255,255,255,' + (a.main ? '0.5' : '0.3') + ')',
          'letter-spacing': '2'
        });
        t.textContent = a.name.toUpperCase();
        ll.appendChild(t);
      });

      // POIs
      var pl = document.getElementById('poi-layer');
      DEMO_POIS.forEach(function(poi) {
        var p = gpsToSvg(poi.lat, poi.lng);
        var r = poi.office ? 10 : 6;
        var g = svgEl('g', {
          transform: 'translate(' + p.x.toFixed(1) + ',' + p.y.toFixed(1) + ')',
          cursor: 'pointer', 'class': 'poi-marker'
        });
        g.appendChild(svgEl('circle', { r: r*2, fill: poi.color, opacity: '0.15', 'class': 'poi-glow' }));
        g.appendChild(svgEl('circle', { r: r, fill: poi.color, opacity: '0.75',
          stroke: poi.office ? '#BBFF46' : 'rgba(255,255,255,0.3)',
          'stroke-width': poi.office ? '2' : '1', 'class': 'poi-dot'
        }));
        g.appendChild(svgEl('circle', { r: r*0.4, fill: '#fff', opacity: '0.8' }));
        if (poi.office) {
          g.appendChild(svgEl('circle', { r: r+4, fill: 'none', stroke: '#BBFF46',
            'stroke-width': '1.5', opacity: '0', 'class': 'office-pulse-svg' }));
        }
        g.addEventListener('click', function() { alert(poi.name); });
        pl.appendChild(g);
      });
    }

    /* --- Pan & Zoom --- */
    (function() {
      var svg = document.getElementById('map-svg');

      svg.addEventListener('mousedown', function(e) {
        if (e.target.closest('.poi-marker')) return;
        mapDragging = true;
        mapDragStart = { x: e.clientX, y: e.clientY, vx: mapViewBox.x, vy: mapViewBox.y };
      });
      svg.addEventListener('mousemove', function(e) {
        if (!mapDragging) return;
        var r = svg.getBoundingClientRect();
        mapViewBox.x = mapDragStart.vx - (e.clientX - mapDragStart.x) * (mapViewBox.w / r.width);
        mapViewBox.y = mapDragStart.vy - (e.clientY - mapDragStart.y) * (mapViewBox.h / r.height);
        applyViewBox();
      });
      document.addEventListener('mouseup', function() { mapDragging = false; });

      // Touch: 1 finger = pan, 2 fingers = pinch zoom
      svg.addEventListener('touchstart', function(e) {
        if (e.touches.length === 2) {
          mapDragging = false;
          var dx = e.touches[0].clientX - e.touches[1].clientX;
          var dy = e.touches[0].clientY - e.touches[1].clientY;
          pinchStartDist = Math.sqrt(dx*dx + dy*dy);
          pinchStartViewBox = { x: mapViewBox.x, y: mapViewBox.y, w: mapViewBox.w, h: mapViewBox.h };
          e.preventDefault();
        } else if (e.touches.length === 1) {
          if (e.target.closest('.poi-marker')) return;
          mapDragging = true; pinchStartDist = 0;
          var t = e.touches[0];
          mapDragStart = { x: t.clientX, y: t.clientY, vx: mapViewBox.x, vy: mapViewBox.y };
        }
      }, { passive: false });

      svg.addEventListener('touchmove', function(e) {
        e.preventDefault();
        if (e.touches.length === 2 && pinchStartDist > 0 && pinchStartViewBox) {
          var dx = e.touches[0].clientX - e.touches[1].clientX;
          var dy = e.touches[0].clientY - e.touches[1].clientY;
          var dist = Math.sqrt(dx*dx + dy*dy);
          var scale = pinchStartDist / dist;
          var newW = pinchStartViewBox.w * scale, newH = pinchStartViewBox.h * scale;
          if (newW < 80) { newW = 80; newH = 80*(SVG_H/SVG_W); }
          if (newW > SVG_W*2) { newW = SVG_W*2; newH = SVG_H*2; }
          var r = svg.getBoundingClientRect();
          var mx = (e.touches[0].clientX+e.touches[1].clientX)/2;
          var my = (e.touches[0].clientY+e.touches[1].clientY)/2;
          var sx = pinchStartViewBox.x + ((mx-r.left)/r.width)*pinchStartViewBox.w;
          var sy = pinchStartViewBox.y + ((my-r.top)/r.height)*pinchStartViewBox.h;
          mapViewBox = { x: sx-((mx-r.left)/r.width)*newW, y: sy-((my-r.top)/r.height)*newH, w: newW, h: newH };
          applyViewBox();
          return;
        }
        if (mapDragging && e.touches.length === 1) {
          var t = e.touches[0], r = svg.getBoundingClientRect();
          mapViewBox.x = mapDragStart.vx - (t.clientX-mapDragStart.x)*(mapViewBox.w/r.width);
          mapViewBox.y = mapDragStart.vy - (t.clientY-mapDragStart.y)*(mapViewBox.h/r.height);
          applyViewBox();
        }
      }, { passive: false });

      svg.addEventListener('touchend', function(e) {
        if (e.touches.length < 2) { pinchStartDist = 0; pinchStartViewBox = null; }
        if (e.touches.length === 0) mapDragging = false;
        if (e.touches.length === 1) {
          mapDragging = true;
          var t = e.touches[0];
          mapDragStart = { x: t.clientX, y: t.clientY, vx: mapViewBox.x, vy: mapViewBox.y };
        }
      });

      svg.addEventListener('wheel', function(e) {
        e.preventDefault();
        var factor = e.deltaY < 0 ? 0.8 : 1.25;
        var newW = mapViewBox.w*factor, newH = mapViewBox.h*factor;
        if (newW < 80 || newW > SVG_W*2) return;
        var r = svg.getBoundingClientRect();
        var mx = mapViewBox.x + ((e.clientX-r.left)/r.width)*mapViewBox.w;
        var my = mapViewBox.y + ((e.clientY-r.top)/r.height)*mapViewBox.h;
        mapViewBox = { x: mx-((e.clientX-r.left)/r.width)*newW, y: my-((e.clientY-r.top)/r.height)*newH, w: newW, h: newH };
        applyViewBox();
      }, { passive: false });
    })();

    drawMap();
  </script>
</body>
</html>
